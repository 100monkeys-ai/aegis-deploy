# AEGIS IAM Pod — Keycloak (PostgreSQL-backed)
# Bounded Context: IAM & Identity Federation
apiVersion: v1
kind: Pod
metadata:
  name: aegis-iam
  labels:
    app: aegis
    context: iam
spec:
  containers:
    - name: keycloak
      image: quay.io/keycloak/keycloak:24.0
      args: ["start"]
      env:
        - name: KC_HTTP_PORT
          value: "8180"
        - name: KEYCLOAK_ADMIN
          value: "${KEYCLOAK_ADMIN}"
        - name: KEYCLOAK_ADMIN_PASSWORD
          value: "${KEYCLOAK_ADMIN_PASSWORD}"
        - name: KC_PROXY_HEADERS
          value: "xforwarded"
        - name: KC_HOSTNAME_URL
          value: "${KEYCLOAK_PUBLIC_URL}"
        - name: KC_HEALTH_ENABLED
          value: "true"
        - name: KC_METRICS_ENABLED
          value: "true"
        - name: KC_HTTP_ENABLED
          value: "true"
        - name: KC_HOSTNAME_STRICT
          value: "false"
        - name: KC_DB
          value: "postgres"
        - name: KC_DB_URL
          value: "jdbc:postgresql://aegis-database:5432/keycloak"
        - name: KC_DB_USERNAME
          value: "${POSTGRES_USER}"
        - name: KC_DB_PASSWORD
          value: "${POSTGRES_PASSWORD}"
      ports:
        - containerPort: 8180
          hostPort: 8180
      readinessProbe:
        httpGet:
          path: /health/ready
          port: 8180
        initialDelaySeconds: 30
        periodSeconds: 15
