# AEGIS Secrets Pod — OpenBao (Server Mode)
# Bounded Context: Secrets & Identity Management
apiVersion: v1
kind: Pod
metadata:
  name: aegis-secrets
  labels:
    app: aegis
    context: secrets
spec:
  containers:
    - name: openbao
      image: docker.io/openbao/openbao:latest
      command: ["bao", "server", "-config=/openbao/config/openbao-config.hcl"]
      env:
        - name: BAO_ADDR
          value: "http://127.0.0.1:8200"
        - name: SKIP_SETCAP
          value: "true"
      ports:
        - containerPort: 8200
          hostPort: 8200
      volumeMounts:
        - name: openbao-config
          mountPath: /openbao/config/openbao-config.hcl
          readOnly: true
        - name: openbao-data
          mountPath: /openbao/data
      readinessProbe:
        exec:
          command: ["sh", "-c", "bao status -format=json 2>/dev/null | grep -q '\"initialized\"'"]
        initialDelaySeconds: 5
        periodSeconds: 10

  volumes:
    - name: openbao-config
      hostPath:
        path: ${AEGIS_ROOT}/podman/pods/secrets/openbao-config.hcl
        type: File
    - name: openbao-data
      persistentVolumeClaim:
        claimName: aegis-openbao-data
