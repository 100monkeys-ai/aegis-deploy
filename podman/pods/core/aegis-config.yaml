# AEGIS Runtime Configuration
# See aegis-orchestrator/cli/templates/config-with-examples.yaml for all options

apiVersion: 100monkeys.ai/v1
kind: NodeConfig

metadata:
  name: "aegis-node-1"
  version: "1.0.0"

spec:
  node:
    id: "aegis-node-1"
    type: "orchestrator"

  llm_providers:
    - name: gemini
      type: gemini
      endpoint: "https://generativelanguage.googleapis.com/v1beta"
      api_key: "env:ZARU_LLM_API_KEY"
      enabled: true
      models:
        - alias: "default"
          model: "gemini-2.5-flash"
          capabilities: ["code", "reasoning"]
          context_window: 1000000
          cost_per_1k_tokens: 0.0001
        - alias: "smart"
          model: "gemini-2.5-pro"
          capabilities: ["code", "reasoning"]
          context_window: 1000000
          cost_per_1k_tokens: 0.001
        - alias: "judge"
          model: "gemini-2.5-flash"
          capabilities: ["reasoning"]
          context_window: 1000000
          cost_per_1k_tokens: 0.0001

  llm_selection:
    strategy: "prefer-cloud"
    default_provider: "gemini"
    max_retries: 3
    retry_delay_ms: 1000

  runtime:
    container_socket_path: "/run/podman/podman.sock"
    container_network_mode: "env:AEGIS_CONTAINER_NETWORK"
    orchestrator_url: "env:AEGIS_ORCHESTRATOR_URL"
    fuse_daemon_endpoint: "env:AEGIS_FUSE_DAEMON_ENDPOINT"

  network:
    bind_address: "0.0.0.0"
    port: 8088

  observability:
    logging:
      level: debug
      format: json
    metrics:
      enabled: true
      port: 9091
    tracing:
      enabled: true
      otlp_endpoint: "env:AEGIS_OTLP_ENDPOINT"

  database:
    url: "env:AEGIS_DATABASE_URL"

  temporal:
    address: "temporal:7233"
    namespace: "default"
    task_queue: "aegis-agents"
    worker_http_endpoint: "http://aegis-temporal:3000"
    max_connection_retries: 30

  storage:
    backend: "seaweedfs"
    seaweedfs:
      filer_url: "http://aegis-storage:8888"

  # Deploy vendored built-in agent and workflow templates on startup.
  # Includes agent-creator-agent, workflow-generator-planner-agent, judge agents,
  # and the builtin-workflow-generator workflow.
  # Required for aegis.agent.generate and aegis.workflow.generate to function.
  deploy_builtins: true
  # Force re-deploy all built-in agents/workflows on startup even if already registered.
  # Set AEGIS_FORCE_DEPLOY_BUILTINS=true in .env to flush stale definitions after an upgrade.
  force_deploy_builtins: "env:AEGIS_FORCE_DEPLOY_BUILTINS"

  cortex:
    grpc_url: "http://aegis-cortex:50052"
    # api_key: "env:CORTEX_API_KEY"   # omit for self-hosted

  security_contexts:
    # ── Tier 2: System Tools Context ─────────────────────────────────────────
    # Used by all orchestrator-spawned sub-executions (aegis.agent.generate,
    # aegis.workflow.generate, aegis.task.execute, etc.) and agent containers
    # that need to use aegis platform tooling including authoring tools.
    # Must use aegis-system- prefix to satisfy validate_context_ownership.
    - name: "aegis-system-agent-runtime"
      description: "Execution context for orchestrator-spawned agent containers. Grants filesystem access scoped to /workspace, shell execution, web access, and the full aegis platform tool surface including agent and workflow authoring tools."
      capabilities:
        - tool_pattern: "fs.*"
          path_allowlist:
            - "/workspace"
        - tool_pattern: "cmd.run"
        - tool_pattern: "web.search"
        - tool_pattern: "web.fetch"
        - tool_pattern: "aegis.schema.get"
        - tool_pattern: "aegis.schema.validate"
        - tool_pattern: "aegis.agent.create"
        - tool_pattern: "aegis.agent.update"
        - tool_pattern: "aegis.agent.list"
        - tool_pattern: "aegis.agent.search"
        - tool_pattern: "aegis.agent.generate"
        - tool_pattern: "aegis.agent.export"
        - tool_pattern: "aegis.agent.logs"
        - tool_pattern: "aegis.agent.wait"
        - tool_pattern: "aegis.workflow.list"
        - tool_pattern: "aegis.workflow.search"
        - tool_pattern: "aegis.workflow.export"
        - tool_pattern: "aegis.workflow.logs"
        - tool_pattern: "aegis.workflow.cancel"
        - tool_pattern: "aegis.workflow.wait"
        - tool_pattern: "aegis.task.execute"
        - tool_pattern: "aegis.task.status"
        - tool_pattern: "aegis.task.list"
        - tool_pattern: "aegis.task.wait"
        - tool_pattern: "aegis.task.cancel"
        - tool_pattern: "aegis.task.logs"
        - tool_pattern: "aegis.execute.intent"
        - tool_pattern: "aegis.execute.status"
        - tool_pattern: "aegis.tools.list"
        - tool_pattern: "aegis.tools.search"
        - tool_pattern: "aegis.runtime.list"
      deny_list: []

    # ── Tier 1: User Tools Contexts (zaru-*) ─────────────────────────────────
    - name: "zaru-free"
      description: "Public consumer tier. Curated safe tools, rate-limited, limited persistent storage. Agent and workflow authoring via generate tools only."
      capabilities:
        - tool_pattern: "web.search"
        - tool_pattern: "web.fetch"
        - tool_pattern: "aegis.schema.get"
        - tool_pattern: "aegis.schema.validate"
        - tool_pattern: "aegis.agent.list"
        - tool_pattern: "aegis.agent.search"
        - tool_pattern: "aegis.agent.export"
        - tool_pattern: "aegis.agent.generate"
        - tool_pattern: "aegis.workflow.list"
        - tool_pattern: "aegis.workflow.search"
        - tool_pattern: "aegis.workflow.export"
        - tool_pattern: "aegis.workflow.run"
        - tool_pattern: "aegis.workflow.generate"
        - tool_pattern: "aegis.task.execute"
        - tool_pattern: "aegis.task.status"
        - tool_pattern: "aegis.task.list"
        - tool_pattern: "aegis.task.wait"
        - tool_pattern: "aegis.task.cancel"
        - tool_pattern: "aegis.task.logs"
        - tool_pattern: "aegis.execute.intent"
        - tool_pattern: "aegis.execute.status"
        - tool_pattern: "aegis.workflow.logs"
        - tool_pattern: "aegis.workflow.cancel"
        - tool_pattern: "aegis.workflow.wait"
        - tool_pattern: "aegis.agent.logs"
        - tool_pattern: "aegis.agent.wait"
        - tool_pattern: "aegis.tools.list"
        - tool_pattern: "aegis.tools.search"
        - tool_pattern: "aegis.runtime.list"
      deny_list: []

    - name: "zaru-pro"
      description: "Individual paid tier. Full consumer tool surface including workflow signals. Agent and workflow authoring via generate tools only."
      capabilities:
        - tool_pattern: "web.search"
        - tool_pattern: "web.fetch"
        - tool_pattern: "aegis.schema.get"
        - tool_pattern: "aegis.schema.validate"
        - tool_pattern: "aegis.agent.list"
        - tool_pattern: "aegis.agent.search"
        - tool_pattern: "aegis.agent.export"
        - tool_pattern: "aegis.agent.generate"
        - tool_pattern: "aegis.workflow.list"
        - tool_pattern: "aegis.workflow.search"
        - tool_pattern: "aegis.workflow.export"
        - tool_pattern: "aegis.workflow.run"
        - tool_pattern: "aegis.workflow.generate"
        - tool_pattern: "aegis.task.execute"
        - tool_pattern: "aegis.task.status"
        - tool_pattern: "aegis.task.list"
        - tool_pattern: "aegis.task.wait"
        - tool_pattern: "aegis.task.cancel"
        - tool_pattern: "aegis.task.logs"
        - tool_pattern: "aegis.execute.intent"
        - tool_pattern: "aegis.execute.status"
        - tool_pattern: "aegis.workflow.logs"
        - tool_pattern: "aegis.workflow.cancel"
        - tool_pattern: "aegis.workflow.wait"
        - tool_pattern: "aegis.workflow.signal"
        - tool_pattern: "aegis.agent.logs"
        - tool_pattern: "aegis.agent.wait"
        - tool_pattern: "aegis.tools.list"
        - tool_pattern: "aegis.tools.search"
        - tool_pattern: "aegis.runtime.list"
      deny_list: []

    - name: "zaru-business"
      description: "Business tier. Full consumer tool surface including workflow signals. Agent and workflow authoring via generate tools only."
      capabilities:
        - tool_pattern: "web.search"
        - tool_pattern: "web.fetch"
        - tool_pattern: "aegis.schema.get"
        - tool_pattern: "aegis.schema.validate"
        - tool_pattern: "aegis.agent.list"
        - tool_pattern: "aegis.agent.search"
        - tool_pattern: "aegis.agent.export"
        - tool_pattern: "aegis.agent.generate"
        - tool_pattern: "aegis.workflow.list"
        - tool_pattern: "aegis.workflow.search"
        - tool_pattern: "aegis.workflow.export"
        - tool_pattern: "aegis.workflow.run"
        - tool_pattern: "aegis.workflow.generate"
        - tool_pattern: "aegis.task.execute"
        - tool_pattern: "aegis.task.status"
        - tool_pattern: "aegis.task.list"
        - tool_pattern: "aegis.task.wait"
        - tool_pattern: "aegis.task.cancel"
        - tool_pattern: "aegis.task.logs"
        - tool_pattern: "aegis.execute.intent"
        - tool_pattern: "aegis.execute.status"
        - tool_pattern: "aegis.workflow.logs"
        - tool_pattern: "aegis.workflow.cancel"
        - tool_pattern: "aegis.workflow.wait"
        - tool_pattern: "aegis.workflow.signal"
        - tool_pattern: "aegis.agent.logs"
        - tool_pattern: "aegis.agent.wait"
        - tool_pattern: "aegis.tools.list"
        - tool_pattern: "aegis.tools.search"
        - tool_pattern: "aegis.runtime.list"
      deny_list: []

    - name: "zaru-enterprise"
      description: "Enterprise tier. Full consumer tool surface including workflow signals. Agent and workflow authoring via generate tools only."
      capabilities:
        - tool_pattern: "web.search"
        - tool_pattern: "web.fetch"
        - tool_pattern: "aegis.schema.get"
        - tool_pattern: "aegis.schema.validate"
        - tool_pattern: "aegis.agent.list"
        - tool_pattern: "aegis.agent.search"
        - tool_pattern: "aegis.agent.export"
        - tool_pattern: "aegis.agent.generate"
        - tool_pattern: "aegis.workflow.list"
        - tool_pattern: "aegis.workflow.search"
        - tool_pattern: "aegis.workflow.export"
        - tool_pattern: "aegis.workflow.run"
        - tool_pattern: "aegis.workflow.generate"
        - tool_pattern: "aegis.task.execute"
        - tool_pattern: "aegis.task.status"
        - tool_pattern: "aegis.task.list"
        - tool_pattern: "aegis.task.wait"
        - tool_pattern: "aegis.task.cancel"
        - tool_pattern: "aegis.task.logs"
        - tool_pattern: "aegis.execute.intent"
        - tool_pattern: "aegis.execute.status"
        - tool_pattern: "aegis.workflow.logs"
        - tool_pattern: "aegis.workflow.cancel"
        - tool_pattern: "aegis.workflow.wait"
        - tool_pattern: "aegis.workflow.signal"
        - tool_pattern: "aegis.agent.logs"
        - tool_pattern: "aegis.agent.wait"
        - tool_pattern: "aegis.tools.list"
        - tool_pattern: "aegis.tools.search"
        - tool_pattern: "aegis.runtime.list"
      deny_list: []

    # ── Tier 3: Operator-Only Context ────────────────────────────────────────
    # Platform operators only. Authenticated via aegis-system realm.
    # Superset of enterprise tier plus destructive and orchestrator commands.
    # Uses aegis-system- prefix (not zaru-) so SEAL middleware preserves
    # force/version parameters for operator tool invocations.
    - name: "aegis-system-operator"
      description: "Platform operator context. All safe, destructive, and orchestrator commands."
      capabilities:
        # Safe commands (shared with all consumer tiers)
        - tool_pattern: "web.search"
        - tool_pattern: "web.fetch"
        - tool_pattern: "aegis.schema.get"
        - tool_pattern: "aegis.schema.validate"
        - tool_pattern: "aegis.agent.create"
        - tool_pattern: "aegis.agent.list"
        - tool_pattern: "aegis.agent.search"
        - tool_pattern: "aegis.agent.export"
        - tool_pattern: "aegis.agent.generate"
        - tool_pattern: "aegis.agent.update"
        - tool_pattern: "aegis.agent.logs"
        - tool_pattern: "aegis.agent.wait"
        - tool_pattern: "aegis.workflow.create"
        - tool_pattern: "aegis.workflow.list"
        - tool_pattern: "aegis.workflow.search"
        - tool_pattern: "aegis.workflow.export"
        - tool_pattern: "aegis.workflow.run"
        - tool_pattern: "aegis.workflow.generate"
        - tool_pattern: "aegis.workflow.update"
        - tool_pattern: "aegis.workflow.logs"
        - tool_pattern: "aegis.workflow.cancel"
        - tool_pattern: "aegis.workflow.wait"
        - tool_pattern: "aegis.workflow.signal"
        - tool_pattern: "aegis.task.execute"
        - tool_pattern: "aegis.task.status"
        - tool_pattern: "aegis.task.list"
        - tool_pattern: "aegis.task.wait"
        - tool_pattern: "aegis.task.cancel"
        - tool_pattern: "aegis.task.logs"
        - tool_pattern: "aegis.execute.intent"
        - tool_pattern: "aegis.execute.status"
        - tool_pattern: "aegis.tools.list"
        - tool_pattern: "aegis.tools.search"
        - tool_pattern: "aegis.runtime.list"
        # Destructive commands (operator-only)
        - tool_pattern: "aegis.agent.delete"
        - tool_pattern: "aegis.workflow.delete"
        - tool_pattern: "aegis.task.remove"
        # Orchestrator commands (operator-only)
        - tool_pattern: "aegis.system.info"
        - tool_pattern: "aegis.system.config"
      deny_list: []

  secrets:
    backend:
      address: "http://aegis-secrets:8200"
      auth_method: "approle"
      approle:
        role_id: "env:OPENBAO_ROLE_ID"
        secret_id_env_var: "OPENBAO_SECRET_ID"
