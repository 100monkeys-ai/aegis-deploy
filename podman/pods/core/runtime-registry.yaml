# AEGIS StandardRuntime Registry
apiVersion: aegis.ai/v1
kind: RuntimeRegistry
metadata:
  name: standard-runtime-registry
  namespace: aegis-system
spec:
  registry_url: "docker.io"

  runtimes:
    python:
      "3.9":
        image: "python:3.9-slim"
        description: "Python 3.9 with slim Debian base"
        deprecated: true
      "3.10":
        image: "python:3.10-slim"
        description: "Python 3.10 with slim Debian base"
      "3.11":
        image: "python:3.11-slim"
        description: "Python 3.11 with slim Debian base"

    javascript:
      "18":
        image: "node:18-alpine"
        description: "Node.js 18 with Alpine base"
      "20":
        image: "node:20-alpine"
        description: "Node.js 20 with Alpine base"

    typescript:
      "5.1":
        image: "node:20-alpine"
        bootstrap_env:
          TYPESCRIPT_VERSION: "5.1"
        description: "TypeScript 5.1 via Node.js 20 with Alpine base; global install required"

    rust:
      "1.74":
        image: "rust:1.74-alpine"
        description: "Rust 1.74 with Alpine base"
      "1.75":
        image: "rust:1.75-alpine"
        description: "Rust 1.75 with Alpine base"

    go:
      "1.20":
        image: "golang:1.20-alpine"
        description: "Go 1.20 with Alpine base"
      "1.21":
        image: "golang:1.21-alpine"
        description: "Go 1.21 with Alpine base"
