# AEGIS SEAL Gateway Pod
# Bounded Context: SEAL Tooling Gateway
apiVersion: v1
kind: Pod
metadata:
  name: aegis-seal-gateway
  labels:
    app: aegis
    context: seal-gateway
spec:
  containers:
    - name: seal-gateway
      image: "ghcr.io/100monkeys-ai/aegis-seal-gateway:${AEGIS_IMAGE_TAG}"
      env:
        - name: RUST_LOG
          value: info
        - name: SEAL_GATEWAY_BIND
          value: "0.0.0.0:8089"
        - name: SEAL_GATEWAY_GRPC_BIND
          value: "0.0.0.0:50055"
        - name: SEAL_GATEWAY_DB
          value: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${AEGIS_DB_HOST}:5433/seal_gateway"
        - name: SEAL_GATEWAY_AUTH_DISABLED
          value: "true"
        - name: SEAL_GATEWAY_NFS_HOST
          value: "${AEGIS_NFS_HOST}"
        - name: SEAL_GATEWAY_CONTAINER_CLI
          value: "podman"
        - name: CONTAINER_HOST
          value: "unix:///run/podman/podman.sock"
      ports:
        - containerPort: 8089
          hostPort: 8089
        - containerPort: 50055
          hostPort: 50055
      volumeMounts:
        - name: seal-gateway-config
          mountPath: /etc/aegis/seal-gateway-config.yaml
        - name: podman-socket
          mountPath: /run/podman/podman.sock
      readinessProbe:
        httpGet:
          path: /
          port: 8089
        initialDelaySeconds: 10
        periodSeconds: 10
      securityContext:
        seLinuxOptions:
          type: "spc_t"

  volumes:
    - name: seal-gateway-config
      hostPath:
        path: ${AEGIS_ROOT}/podman/pods/seal-gateway/seal-gateway-config.yaml
        type: File
    - name: podman-socket
      hostPath:
        path: ${CONTAINER_SOCK}
        type: Socket
