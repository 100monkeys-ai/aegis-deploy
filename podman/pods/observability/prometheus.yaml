global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yaml

scrape_configs:
  # AEGIS Core Runtime
  - job_name: aegis-runtime
    static_configs:
      - targets: ['aegis-core:9091']
        labels:
          service: aegis-runtime
          context: core

  # Keycloak IAM
  - job_name: keycloak
    metrics_path: /metrics
    static_configs:
      - targets: ['aegis-iam:8180']
        labels:
          service: keycloak
          context: iam

  # SeaweedFS Distributed Storage
  - job_name: seaweedfs-master
    static_configs:
      - targets: ['aegis-storage:9324']
        labels:
          service: seaweedfs-master
          context: storage

  - job_name: seaweedfs-volume
    static_configs:
      - targets: ['aegis-storage:9325']
        labels:
          service: seaweedfs-volume
          context: storage

  - job_name: seaweedfs-filer
    static_configs:
      - targets: ['aegis-storage:9326']
        labels:
          service: seaweedfs-filer
          context: storage

  # OpenBao Secrets Manager
  - job_name: openbao
    metrics_path: /v1/sys/metrics
    params:
      format: ['prometheus']
    static_configs:
      - targets: ['aegis-secrets:8200']
        labels:
          service: openbao
          context: secrets

  # Temporal Workflow Engine
  - job_name: temporal
    static_configs:
      - targets: ['aegis-temporal:7233']
        labels:
          service: temporal
          context: temporal

  # PostgreSQL (via exporter sidecar)
  - job_name: postgres
    static_configs:
      - targets: ['aegis-database:9187']
        labels:
          service: postgresql
          context: database

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
