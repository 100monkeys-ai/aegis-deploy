apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://localhost:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"

  - name: Loki
    type: loki
    access: proxy
    url: http://localhost:3100
    editable: false

  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://localhost:16686
    editable: false
