server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://localhost:3100/loki/api/v1/push

scrape_configs:
  - job_name: podman-containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: podman
          __path__: /var/log/podman-containers/*/*/*.log
    pipeline_stages:
      - docker: {}
      - label_copy:
          container_name: container
      - timestamp:
          source: time
          format: RFC3339Nano
