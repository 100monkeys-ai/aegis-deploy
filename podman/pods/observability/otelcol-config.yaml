receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

exporters:
  loki:
    endpoint: http://localhost:3100/loki/api/v1/push
    default_labels_enabled:
      exporter: false
      job: true
  otlp/jaeger:
    endpoint: localhost:14250
    tls:
      insecure: true

service:
  extensions: [health_check]
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [loki]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger]

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
