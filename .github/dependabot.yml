version: 2

updates:
  # ─── Docker (Caddy base image) ────────────────────────────────────────────
  # Targets podman/pods/edge/Dockerfile.caddy
  - package-ecosystem: docker
    directory: /podman/pods/edge
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(docker)"

  # ─── GitHub Actions ───────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        patterns:
          - "*"
